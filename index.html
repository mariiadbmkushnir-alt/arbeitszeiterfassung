<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbeitszeiterfassung - Café Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap');

        body {
            font-family: 'Lora', serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Botanical background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M10,50 Q30,30 50,50 T90,50" fill="none" stroke="black" stroke-width="0.5"/><circle cx="50" cy="30" r="3"/><circle cx="70" cy="40" r="2"/></svg>');
            pointer-events: none;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 248, 242, 0.95);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(139, 90, 43, 0.2);
        }

        .header {
            background: linear-gradient(135deg, #d4a574 0%, #c19a6b 100%);
            color: #2c2416;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            border-bottom: 3px solid rgba(139, 90, 43, 0.3);
        }

        .header::after {
            content: '🦋';
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            opacity: 0.6;
        }

        .header::before {
            content: '🦋';
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 25px;
            opacity: 0.6;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.85;
            font-style: italic;
        }

        .content {
            padding: 40px 30px;
            min-height: 400px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2c2416;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #d4a574;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Lora', serif;
            background: rgba(255, 248, 242, 0.8);
            color: #2c2416;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #8b5a2b;
            background: white;
            box-shadow: 0 0 0 4px rgba(212, 165, 116, 0.2);
        }

        .button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Lora', serif;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5a2b 0%, #6b4423 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 90, 43, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 90, 43, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(212, 165, 116, 0.2);
            color: #8b5a2b;
            border: 2px solid #d4a574;
        }

        .btn-secondary:hover {
            background: rgba(212, 165, 116, 0.3);
        }

        .btn-danger {
            background: #c1666b;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #a85460;
        }

        .btn-success {
            background: #6ba372;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #568a5f;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 13px;
            margin: 4px;
            display: inline-block;
            width: auto;
        }

        .status {
            background: rgba(107, 163, 114, 0.15);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 25px;
            border: 2px solid rgba(107, 163, 114, 0.3);
        }

        .status.clocked-in {
            background: rgba(107, 163, 114, 0.25);
            border-color: rgba(107, 163, 114, 0.5);
        }

        .status-text {
            font-size: 14px;
            color: #2c2416;
            margin-bottom: 8px;
        }

        .status-time {
            font-size: 28px;
            font-weight: 700;
            color: #6ba372;
            font-family: 'Playfair Display', serif;
        }

        .employee-card {
            background: rgba(212, 165, 116, 0.1);
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .employee-card:hover {
            background: rgba(212, 165, 116, 0.2);
            border-color: #d4a574;
            transform: translateX(5px);
        }

        .employee-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .employee-name {
            font-size: 16px;
            color: #2c2416;
            font-weight: 600;
        }

        .employee-actions {
            display: flex;
            gap: 8px;
        }

        .employee-hours {
            font-size: 18px;
            color: #8b5a2b;
            font-weight: 700;
        }

        .employee-shifts {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(139, 90, 43, 0.2);
            font-size: 12px;
            color: #666;
        }

        .shift-item {
            padding: 6px 0;
            color: #5c5c5c;
        }

        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #d4a574;
            background: rgba(255, 248, 242, 0.8);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            color: #8b5a2b;
            font-family: 'Lora', serif;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #8b5a2b 0%, #6b4423 100%);
            color: white;
            border-color: #8b5a2b;
        }

        .back-btn {
            background: transparent;
            color: #8b5a2b;
            padding: 10px 16px;
            border: 2px solid #d4a574;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 14px;
            font-family: 'Lora', serif;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(212, 165, 116, 0.1);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: linear-gradient(135deg, #8b5a2b 0%, #6b4423 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.85;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .add-employee-form {
            background: rgba(212, 165, 116, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px dashed #d4a574;
        }

        .add-employee-form h3 {
            margin-bottom: 15px;
            color: #2c2416;
            font-size: 16px;
        }

        .error {
            background: rgba(193, 102, 107, 0.2);
            color: #8b5a5f;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            border-left: 4px solid #c1666b;
        }

        .success {
            background: rgba(107, 163, 114, 0.2);
            color: #568a5f;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            border-left: 4px solid #6ba372;
        }

        .role-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .role-btn {
            padding: 30px 20px;
            border: 2px solid #d4a574;
            border-radius: 15px;
            background: rgba(255, 248, 242, 0.8);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: #8b5a2b;
            font-family: 'Lora', serif;
        }

        .role-btn:hover {
            border-color: #8b5a2b;
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(139, 90, 43, 0.2);
        }

        .role-btn.active {
            background: linear-gradient(135deg, #8b5a2b 0%, #6b4423 100%);
            color: white;
            border-color: #8b5a2b;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 20px;
            }

            .content {
                padding: 30px 20px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 26px;
            }

            .role-selection {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>☕ Arbeitszeiterfassung</h1>
            <p>Café Management System</p>
        </div>

        <div class="content">
            <!-- Login Section -->
            <div id="loginSection" class="section active">
                <h2 style="margin-bottom: 25px; color: #2c2416; font-family: 'Playfair Display', serif; font-size: 24px;">Anmelden</h2>
                
                <div id="loginError" class="error hidden"></div>

                <div class="form-group">
                    <label>Benutzername</label>
                    <input type="text" id="loginUsername" placeholder="Geben Sie Ihren Benutzernamen ein">
                </div>

                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" id="loginPassword" placeholder="Geben Sie Ihr Passwort ein">
                </div>

                <button class="button btn-primary" onclick="login()">Anmelden</button>

                <div style="text-align: center; margin-top: 20px;">
                    <p style="color: #666; margin-bottom: 10px;">Noch kein Konto?</p>
                    <button class="button btn-secondary" onclick="switchToRegister()">Konto erstellen</button>
                </div>
            </div>

            <!-- Register Section -->
            <div id="registerSection" class="section">
                <h2 style="margin-bottom: 25px; color: #2c2416; font-family: 'Playfair Display', serif; font-size: 24px;">Registrierung</h2>
                
                <div id="registerError" class="error hidden"></div>

                <div class="form-group">
                    <label>Benutzername</label>
                    <input type="text" id="registerUsername" placeholder="Wählen Sie einen Benutzernamen">
                </div>

                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" id="registerPassword" placeholder="Wählen Sie ein Passwort">
                </div>

                <button class="button btn-primary" onclick="register()">Registrieren</button>

                <button class="button btn-secondary" onclick="switchToLogin()">Zur Anmeldung</button>
            </div>

            <!-- Main App (After Login) -->
            <div id="appSection" class="section">
                <button class="back-btn" onclick="logout()">← Abmelden</button>

                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('worker')">👤 Mitarbeiter</button>
                    <button class="tab-btn" onclick="switchTab('manager')">📊 Manager</button>
                </div>

                <!-- Worker Tab -->
                <div id="workerTab" class="tab-content">
                    <div class="form-group">
                        <label>Wählen Sie Ihren Namen:</label>
                        <select id="employeeSelect" onchange="selectEmployee()">
                            <option value="">-- Wählen Sie einen Namen --</option>
                        </select>
                    </div>

                    <div id="statusBox" class="status">
                        <div class="status-text">Status: <strong>Abwesend</strong></div>
                        <div class="status-time" id="statusDisplay">--:--</div>
                    </div>

                    <button id="clockBtn" class="button btn-success" onclick="clockIn()" disabled>
                        ⏱️ Schicht starten
                    </button>

                    <div id="workerSuccess" class="success hidden">
                        ✓ Daten erfolgreich gespeichert!
                    </div>
                </div>

                <!-- Manager Tab -->
                <div id="managerTab" class="tab-content hidden">
                    <div class="add-employee-form">
                        <h3>➕ Neuen Mitarbeiter hinzufügen</h3>
                        <div class="form-group" style="margin-bottom: 12px;">
                            <input type="text" id="newEmployeeName" placeholder="Name des Mitarbeiters">
                        </div>
                        <button class="button btn-primary" style="margin-bottom: 0;" onclick="addEmployee()">Mitarbeiter hinzufügen</button>
                    </div>

                    <div id="managerError" class="error hidden"></div>
                    <div id="managerSuccess" class="success hidden"></div>

                    <div class="stats">
                        <div class="stat-box">
                            <div class="stat-label">Mitarbeiter</div>
                            <div class="stat-value" id="totalEmployees">0</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Stunden gesamt</div>
                            <div class="stat-value" id="totalHours">0</div>
                        </div>
                    </div>

                    <h3 style="margin-bottom: 15px; color: #2c2416; font-size: 16px;">Mitarbeiterliste</h3>
                    <div id="employeesList"></div>

                    <div style="margin-top: 25px; padding-top: 25px; border-top: 2px solid rgba(139, 90, 43, 0.2);">
                        <h3 style="margin-bottom: 15px; color: #2c2416; font-size: 16px;">📊 Berichte exportieren</h3>
                        <button class="button btn-primary" onclick="exportCSV()">📥 Als CSV exportieren</button>
                        <button class="button btn-primary" onclick="exportJSON()">📥 Als JSON exportieren</button>
                        <button class="button btn-secondary" onclick="printReport()">🖨️ Drucken</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let token = localStorage.getItem('token');
        let currentEmployee = null;
        let isClocked = false;
        let clockedInTime = null;
        let currentShiftId = null;
        let clockInterval = null;
        let employees = [];

        if (token) {
            showApp();
            loadEmployees();
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            if (!username || !password) {
                showError(errorDiv, 'Benutzername und Passwort erforderlich');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(errorDiv, 'Ungültige Anmeldedaten');
                    return;
                }

                localStorage.setItem('token', data.token);
                token = data.token;
                showApp();
                loadEmployees();
            } catch (error) {
                showError(errorDiv, 'Anmeldungsfehler: ' + error.message);
            }
        }

        async function register() {
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const errorDiv = document.getElementById('registerError');

            if (!username || !password) {
                showError(errorDiv, 'Benutzername und Passwort erforderlich');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(errorDiv, 'Benutzername existiert bereits');
                    return;
                }

                switchToLogin();
                document.getElementById('loginUsername').value = username;
            } catch (error) {
                showError(errorDiv, 'Registrierungsfehler: ' + error.message);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            document.getElementById('appSection').classList.remove('active');
            document.getElementById('loginSection').classList.add('active');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function switchToRegister() {
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('registerSection').classList.add('active');
        }

        function switchToLogin() {
            document.getElementById('registerSection').classList.remove('active');
            document.getElementById('loginSection').classList.add('active');
        }

        function showApp() {
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('registerSection').classList.remove('active');
            document.getElementById('appSection').classList.add('active');
        }

        async function loadEmployees() {
            try {
                const response = await fetch(`${API_URL}/api/employees`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                employees = await response.json();
                updateEmployeeSelect();
                displayEmployees();
                updateStats();
            } catch (error) {
                console.error('Error loading employees:', error);
            }
        }

        function updateEmployeeSelect() {
            const select = document.getElementById('employeeSelect');
            select.innerHTML = '<option value="">-- Wählen Sie einen Namen --</option>';
            employees.forEach(emp => {
                const option = document.createElement('option');
                option.value = emp.id;
                option.textContent = emp.name;
                select.appendChild(option);
            });
        }

        function selectEmployee() {
            const select = document.getElementById('employeeSelect');
            currentEmployee = employees.find(e => e.id === parseInt(select.value));
            document.getElementById('clockBtn').disabled = !currentEmployee;
            updateStatus();
        }

        async function clockIn() {
            if (!currentEmployee) return;

            if (!isClocked) {
                try {
                    const response = await fetch(`${API_URL}/api/clock-in`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ employeeId: currentEmployee.id })
                    });

                    const data = await response.json();
                    currentShiftId = data.id;
                    isClocked = true;
                    clockedInTime = new Date();
                    updateStatus();
                    startClock();
                } catch (error) {
                    console.error('Clock in error:', error);
                }
            } else {
                try {
                    await fetch(`${API_URL}/api/clock-out`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ shiftId: currentShiftId })
                    });

                    isClocked = false;
                    clockedInTime = null;
                    currentShiftId = null;
                    updateStatus();
                    stopClock();
                    showSuccess('workerSuccess', '✓ Schicht gespeichert!');
                    loadEmployees();
                } catch (error) {
                    console.error('Clock out error:', error);
                }
            }
        }

        function updateStatus() {
            const statusBox = document.getElementById('statusBox');
            const clockBtn = document.getElementById('clockBtn');

            if (isClocked && clockedInTime) {
                statusBox.classList.add('clocked-in');
                statusBox.querySelector('.status-text').innerHTML = 'Status: <strong>Im Dienst 🟢</strong>';
                clockBtn.textContent = '⏹️ Schicht beenden';
                clockBtn.className = 'button btn-danger';
            } else {
                statusBox.classList.remove('clocked-in');
                statusBox.querySelector('.status-text').innerHTML = 'Status: <strong>Abwesend</strong>';
                document.getElementById('statusDisplay').textContent = '--:--';
                clockBtn.textContent = '⏱️ Schicht starten';
                clockBtn.className = 'button btn-success';
            }
        }

        function startClock() {
            clockInterval = setInterval(() => {
                if (clockedInTime) {
                    const now = new Date();
                    const duration = now - clockedInTime;
                    const hours = Math.floor(duration / 3600000);
                    const minutes = Math.floor((duration % 3600000) / 60000);
                    document.getElementById('statusDisplay').textContent = 
                        `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function stopClock() {
            if (clockInterval) clearInterval(clockInterval);
        }

        async function addEmployee() {
            const name = document.getElementById('newEmployeeName').value;
            const errorDiv = document.getElementById('managerError');

            if (!name) {
                showError(errorDiv, 'Name erforderlich');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/employees`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name })
                });

                if (response.ok) {
                    document.getElementById('newEmployeeName').value = '';
                    showSuccess('managerSuccess', '✓ Mitarbeiter hinzugefügt!');
                    loadEmployees();
                } else {
                    showError(errorDiv, 'Fehler beim Hinzufügen');
                }
            } catch (error) {
                showError(errorDiv, 'Fehler: ' + error.message);
            }
        }

        async function deleteEmployee(id) {
            if (!confirm('Diesen Mitarbeiter wirklich löschen?')) return;

            try {
                await fetch(`${API_URL}/api/employees/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                loadEmployees();
            } catch (error) {
                console.error('Delete error:', error);
            }
        }

        function displayEmployees() {
            const list = document.getElementById('employeesList');
            list.innerHTML = '';

            employees.forEach(emp => {
                const totalHours = (emp.shifts || []).reduce((sum, s) => sum + (s.duration_hours || 0), 0).toFixed(2);
                
                const card = document.createElement('div');
                card.className = 'employee-card';
                card.innerHTML = `
                    <div class="employee-header">
                        <div>
                            <div class="employee-name">${emp.name}</div>
                            <div style="font-size: 12px; color: #666; margin-top: 4px;">${emp.shifts?.length || 0} Schichten</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="employee-hours">${totalHours} Std</div>
                            <div class="employee-actions">
                                <button class="button btn-small btn-danger" onclick="deleteEmployee(${emp.id})">Löschen</button>
                            </div>
                        </div>
                    </div>
                    ${emp.shifts && emp.shifts.length > 0 ? `
                        <div class="employee-shifts">
                            ${emp.shifts.slice(-3).map(shift => `
                                <div class="shift-item">
                                    ${new Date(shift.clock_in).toLocaleDateString('de-DE')}: ${shift.duration_hours?.toFixed(2)} Std
                                </div>
                            `).join('')}
                            ${emp.shifts.length > 3 ? `<div class="shift-item">... noch ${emp.shifts.length - 3}</div>` : ''}
                        </div>
                    ` : ''}
                `;
                list.appendChild(card);
            });

            if (employees.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Keine Mitarbeiter vorhanden</div>';
            }
        }

        function updateStats() {
            document.getElementById('totalEmployees').textContent = employees.length;
            const totalHours = employees.reduce((sum, emp) => 
                sum + (emp.shifts || []).reduce((s, shift) => s + (shift.duration_hours || 0), 0), 0
            ).toFixed(1);
            document.getElementById('totalHours').textContent = totalHours;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            if (tab === 'worker') {
                document.getElementById('workerTab').classList.remove('hidden');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.getElementById('managerTab').classList.remove('hidden');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
        }

        async function exportCSV() {
            try {
                const response = await fetch(`${API_URL}/api/export/csv`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const csv = await response.text();
                downloadFile(csv, 'arbeitszeiterfassung.csv', 'text/csv');
            } catch (error) {
                console.error('Export error:', error);
            }
        }

        function exportJSON() {
            const json = JSON.stringify(employees, null, 2);
            downloadFile(json, 'arbeitszeiterfassung.json', 'application/json');
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type: type + ';charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        function printReport() {
            let html = '<h1>Arbeitszeiterfassung Bericht</h1>';
            html += `<p>Datum: ${new Date().toLocaleDateString('de-DE')}</p>`;
            html += '<table border="1" cellpadding="10" style="width:100%; border-collapse:collapse;">';
            html += '<tr><th>Name</th><th>Eingang</th><th>Ausgang</th><th>Stunden</th></tr>';

            employees.forEach(emp => {
                (emp.shifts || []).forEach(shift => {
                    html += `<tr><td>${emp.name}</td><td>${new Date(shift.clock_in).toLocaleString('de-DE')}</td><td>${new Date(shift.clock_out).toLocaleString('de-DE')}</td><td>${shift.duration_hours?.toFixed(2)}</td></tr>`;
                });
            });

            html += '</table>';

            const printWindow = window.open('', '', 'height=600,width=900');
            printWindow.document.write(html);
            printWindow.document.close();
            printWindow.print();
        }

        function showError(element, message) {
            element.textContent = message;
            element.classList.remove('hidden');
            setTimeout(() => element.classList.add('hidden'), 5000);
        }

        function showSuccess(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.remove('hidden');
            setTimeout(() => element.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
